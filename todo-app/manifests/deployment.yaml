apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: shared-image
          persistentVolumeClaim:
            claimName: image-claim
      containers:
        - name: todo-app
          image: joelheusala/todo-app:1.13
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "8080"
          volumeMounts:
            - name: shared-image
              mountPath: /shared
